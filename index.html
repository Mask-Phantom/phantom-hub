<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phantom Hub | Operator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="sidebar">
        <h1>PHANTOM HUB</h1>
        <div class="card" onclick="showPage('forum')">SECURITY_FORUM</div>
        <div class="card" onclick="showPage('certs')">CERT_PATHWAY</div>
        <div class="card" onclick="showPage('peers')">REALTIME_CHAT</div>
    </div>

    <div id="main-stage">
        <div id="dashboard"><h2>Welcome, Operator. Select a Node.</h2></div>
        
        <div id="forum" style="display: none;"><h2>SECURITY_FORUM</h2></div>
        <div id="certs" style="display: none;"><h2>CERTIFICATION_PATHWAY</h2></div>
        
        <div id="peers" style="display: none;">
            <h2>LIVE_CHAT</h2>
            <div id="chat-box"></div>
            <input type="text" id="message-input" placeholder="Type a message...">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
