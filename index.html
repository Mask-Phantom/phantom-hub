<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Phantom Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { background-color: #0a151a; color: #d9e4ec; font-family: 'Inter', sans-serif; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }
        .message-sent { background-color: #005c4b; border-radius: 8px 0px 8px 8px; padding: 6px 10px; }
        .message-received { background-color: #263238; border-radius: 0px 8px 8px 8px; padding: 6px 10px; }
        .nav-btn { transition: all 0.3s ease; }
        .nav-active-chat { background-color: #2c363d; color: #59dcb5; border-radius: 12px; }
        .nav-active-pro { background-color: rgba(251, 191, 36, 0.15); color: #fbbf24; border-radius: 12px; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <div id="auth-container" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#0a151a]">
        <div class="bg-[#172127] p-8 rounded-2xl border border-[#3f4945] w-96 shadow-lg">
            <h2 id="auth-title" class="text-2xl font-bold text-[#59dcb5] mb-6 text-center tracking-wide">Phantom Hub Login</h2>
            
            <input id="auth-email" type="email" placeholder="Email" class="w-full bg-[#2c363d] p-3 rounded-xl text-white mb-3 outline-none focus:ring-1 focus:ring-[#005c4b]">
            
            <div class="relative mb-3">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-[#2c363d] p-3 rounded-xl text-white outline-none focus:ring-1 focus:ring-[#005c4b]">
                <button onclick="togglePassword('auth-pass', 'eye-icon-1')" class="absolute right-3 top-3 text-gray-400 hover:text-white transition-colors">
                    <span id="eye-icon-1" class="material-symbols-outlined">visibility</span>
                </button>
            </div>
            
            <div id="signup-extra" class="hidden">
                <div class="relative mb-3">
                    <input id="auth-pass-confirm" type="password" placeholder="Confirm Password" class="w-full bg-[#2c363d] p-3 rounded-xl text-white outline-none focus:ring-1 focus:ring-[#005c4b]">
                    <button onclick="togglePassword('auth-pass-confirm', 'eye-icon-2')" class="absolute right-3 top-3 text-gray-400 hover:text-white transition-colors">
                        <span id="eye-icon-2" class="material-symbols-outlined">visibility</span>
                    </button>
                </div>

                <input id="auth-username" type="text" placeholder="Username (e.g., phantom)" class="w-full bg-[#2c363d] p-3 rounded-xl text-white mb-3 outline-none focus:ring-1 focus:ring-[#005c4b]">
                <input id="auth-fullname" type="text" placeholder="Full Name" class="w-full bg-[#2c363d] p-3 rounded-xl text-white mb-3 outline-none focus:ring-1 focus:ring-[#005c4b]">
                <input id="auth-role" type="text" placeholder="Role (e.g., Cybersecurity Student)" class="w-full bg-[#2c363d] p-3 rounded-xl text-white mb-6 outline-none focus:ring-1 focus:ring-[#005c4b]">
            </div>

            <button id="login-btn" onclick="executeAuth(false)" class="w-full bg-[#005c4b] hover:bg-[#004236] text-white p-3 rounded-xl font-bold transition-colors">Log In</button>
            <button id="signup-btn" onclick="executeAuth(true)" class="w-full bg-[#59dcb5] hover:bg-[#3fb897] text-[#0a151a] p-3 rounded-xl font-bold transition-colors hidden">Create Account</button>
            
            <p class="text-center mt-5 text-sm text-gray-400">
                <button onclick="toggleAuthMode()" id="auth-toggle-text" class="hover:text-white transition-colors">Need an account? Sign up</button>
            </p>
        </div>
    </div>

    <div id="chat-container" class="flex h-full w-full hidden">
        
        <aside class="w-[70px] bg-[#172127] flex flex-col items-center py-6 border-r border-[#3f4945] z-10 shadow-[4px_0_15px_rgba(0,0,0,0.2)]">
            
            <div class="mb-6 relative group cursor-pointer" onclick="document.getElementById('avatar-upload').click()" title="Change Profile Picture">
                <img id="sidebar-avatar" src="https://ui-avatars.com/api/?name=User&background=2c363d&color=59dcb5" class="w-10 h-10 rounded-full border border-[#3f4945] object-cover group-hover:opacity-30 transition-opacity">
                <span class="material-symbols-outlined absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 text-white pointer-events-none drop-shadow-md">photo_camera</span>
            </div>
            <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="window.uploadAvatar(event)">

            <button id="nav-chat" onclick="showPage('chat')" class="nav-btn nav-active-chat p-3 mb-6 text-[#d9e4ec] hover:text-white w-12 h-12 flex items-center justify-center" title="Chat">
                <span class="material-symbols-outlined text-2xl">chat</span>
            </button>
            
            <button id="nav-pro" onclick="showPage('pro-settings')" class="nav-btn p-3 mt-auto text-gray-400 hover:text-[#fbbf24] w-12 h-12 flex items-center justify-center" title="Pro Features">
                <span class="material-symbols-outlined text-2xl">workspace_premium</span>
            </button>
            
            <button onclick="window.logOutUser()" class="nav-btn p-3 mt-4 text-[#ef4444] hover:text-[#f87171] hover:bg-red-500/10 rounded-xl w-12 h-12 flex items-center justify-center" title="Log Out">
                <span class="material-symbols-outlined text-2xl">logout</span>
            </button>
        </aside>

        <main class="flex-grow flex flex-col h-full relative bg-[#0a151a]">
            <div id="chat" class="flex flex-col h-full w-full absolute inset-0 transition-opacity duration-300">
                <header class="bg-[#172127] p-4 border-b border-[#3f4945] flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-[#005c4b] rounded-full flex items-center justify-center text-white font-bold">#</div>
                        <div>
                            <h2 class="font-bold text-white leading-tight">Global Room</h2>
                            <p class="text-xs text-[#59dcb5]">E2E Encrypted</p>
                        </div>
                    </div>
                </header>

                <div id="message-list" class="flex-grow overflow-y-auto p-6 space-y-4 custom-scrollbar bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
                
                <footer class="p-4 bg-[#172127] border-t border-[#3f4945]">
                    <div class="flex gap-2 max-w-5xl mx-auto">
                        <input id="message-input" class="flex-grow bg-[#2c363d] p-3 rounded-xl text-white outline-none focus:ring-1 focus:ring-[#005c4b] transition-all" placeholder="Type a secure message..." type="text"/>
                        <button onclick="window.sendMessage()" class="bg-[#005c4b] hover:bg-[#004236] text-white p-3 rounded-xl transition-colors flex items-center justify-center w-12">
                            <span class="material-symbols-outlined text-xl">send</span>
                        </button>
                    </div>
                </footer>
            </div>

            <div id="pro-settings" class="hidden h-full w-full absolute inset-0 overflow-y-auto bg-gradient-to-br from-[#161124] via-[#0a151a] to-[#0a151a] p-10 transition-opacity duration-300">
                <div class="max-w-4xl mx-auto">
                    <header class="mb-12 border-b border-gray-800 pb-6 flex items-center gap-4">
                        <span class="material-symbols-outlined text-5xl text-[#fbbf24]">workspace_premium</span>
                        <div>
                            <h1 class="text-4xl text-transparent bg-clip-text bg-gradient-to-r from-[#fbbf24] to-yellow-600 font-bold tracking-tight">Phantom Pro</h1>
                            <p class="text-gray-400 mt-1">Elevate your operational security and visibility.</p>
                        </div>
                    </header>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.sendMessage();
        });
        
        function showPage(id) {
            document.getElementById('chat').classList.toggle('hidden', id !== 'chat');
            document.getElementById('pro-settings').classList.toggle('hidden', id !== 'pro-settings');

            const navChat = document.getElementById('nav-chat');
            const navPro = document.getElementById('nav-pro');

            if (id === 'chat') {
                navChat.classList.add('nav-active-chat'); navChat.classList.remove('text-gray-400');
                navPro.classList.remove('nav-active-pro'); navPro.classList.add('text-gray-400');
            } else {
                navPro.classList.add('nav-active-pro'); navPro.classList.remove('text-gray-400');
                navChat.classList.remove('nav-active-chat'); navChat.classList.add('text-[#d9e4ec]');
            }
        }

        let isSignUpMode = false;
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('signup-extra').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('login-btn').classList.toggle('hidden', isSignUpMode);
            document.getElementById('signup-btn').classList.toggle('hidden', !isSignUpMode);
            document.getElementById('auth-title').innerText = isSignUpMode ? 'Create Account' : 'Phantom Hub Login';
            document.getElementById('auth-toggle-text').innerText = isSignUpMode ? 'Already have an account? Log in' : 'Need an account? Sign up';
        }

        // New Password Toggle Logic
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.innerText = "visibility_off";
            } else {
                input.type = "password";
                icon.innerText = "visibility";
            }
        }

        // Unified Auth Execution with Validation
        function executeAuth(isSignup) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            
            if (isSignup) {
                const confirmPass = document.getElementById('auth-pass-confirm').value;
                if (pass !== confirmPass) {
                    alert("Security mismatch: Passwords do not match.");
                    return;
                }
                const username = document.getElementById('auth-username').value;
                const name = document.getElementById('auth-fullname').value;
                const role = document.getElementById('auth-role').value;
                window.signUpUser(email, pass, username, name, role);
            } else {
                window.logInUser(email, pass);
            }
        }
    </script>
</body>
</html>
